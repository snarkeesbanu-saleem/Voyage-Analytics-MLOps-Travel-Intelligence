# =============================================================================
# Voyage Analytics MLOps — Centralized Configuration
# =============================================================================

# ── Directory Paths (relative to project root) ──────────────────────────────
paths:
  data_dir: "data/"
  models_dir: "models/"
  logs_dir: "logs/"
  reports_dir: "reports/"

# ── Data File Names ─────────────────────────────────────────────────────────
data_files:
  users: "users.csv"
  flights: "flights.csv"
  hotels: "hotels.csv"

# ── Date & Categorical Metadata ────────────────────────────────────────────
data_meta:
  date_format: "%m/%d/%Y"
  flight_types: ["firstClass", "economic", "premium"]
  agencies: ["FlyingDrops", "CloudFy", "Rainbow"]

# ── Preprocessing ───────────────────────────────────────────────────────────
preprocessing:
  outlier_iqr_multiplier: 1.5
  test_size: 0.2
  random_state: 42
  churn_threshold_days: 180

# ── Model Hyperparameters ───────────────────────────────────────────────────
models:
  # — Flight Price Regression ------------------------------------------------
  flight_price_model:
    target: "price"
    features:
      - "flightType"
      - "time"
      - "distance"
      - "agency"
      - "from"
      - "to"
    estimators:
      random_forest:
        type: "RandomForestRegressor"
        params:
          n_estimators: 200
          max_depth: 15
          min_samples_split: 5
          min_samples_leaf: 2
          max_features: "sqrt"
          random_state: 42
          n_jobs: -1
        grid_search:
          n_estimators: [100, 200, 300]
          max_depth: [10, 15, 20, null]
          min_samples_split: [2, 5, 10]
          min_samples_leaf: [1, 2, 4]
          max_features: ["sqrt", "log2"]
      gradient_boosting:
        type: "GradientBoostingRegressor"
        params:
          n_estimators: 200
          max_depth: 5
          learning_rate: 0.1
          subsample: 0.8
          min_samples_split: 5
          min_samples_leaf: 2
          random_state: 42
        grid_search:
          n_estimators: [100, 200, 300]
          max_depth: [3, 5, 7]
          learning_rate: [0.01, 0.05, 0.1, 0.2]
          subsample: [0.7, 0.8, 0.9, 1.0]
          min_samples_split: [2, 5, 10]

  # — Gender Classifier ─────────────────────────────────────────────────────
  gender_classifier:
    target: "gender"
    features:
      - "age"
      - "flightType"
      - "price"
      - "distance"
      - "time"
      - "agency"
      - "days"
      - "hotel_price"
      - "hotel_total"
    estimators:
      random_forest:
        type: "RandomForestClassifier"
        params:
          n_estimators: 150
          max_depth: 12
          min_samples_split: 5
          min_samples_leaf: 2
          class_weight: "balanced"
          random_state: 42
          n_jobs: -1
        grid_search:
          n_estimators: [100, 150, 200]
          max_depth: [8, 12, 16, null]
          min_samples_split: [2, 5, 10]
          min_samples_leaf: [1, 2, 4]
          class_weight: ["balanced", null]
      logistic_regression:
        type: "LogisticRegression"
        params:
          C: 1.0
          penalty: "l2"
          solver: "lbfgs"
          max_iter: 1000
          class_weight: "balanced"
          random_state: 42
        grid_search:
          C: [0.01, 0.1, 1.0, 10.0]
          penalty: ["l1", "l2"]
          solver: ["liblinear", "saga"]
          class_weight: ["balanced", null]

  # — Churn Classifier ──────────────────────────────────────────────────────
  churn_classifier:
    target: "churned"
    features:
      - "total_flights"
      - "total_hotel_bookings"
      - "total_spend"
      - "avg_flight_price"
      - "avg_hotel_price"
      - "unique_destinations"
      - "preferred_flight_type"
      - "preferred_agency"
      - "age"
      - "days_since_last_trip"
      - "feedback_sentiment"
    estimators:
      random_forest:
        type: "RandomForestClassifier"
        params:
          n_estimators: 200
          max_depth: 10
          min_samples_split: 10
          min_samples_leaf: 4
          class_weight: "balanced"
          random_state: 42
          n_jobs: -1
        grid_search:
          n_estimators: [100, 200, 300]
          max_depth: [8, 10, 15, null]
          min_samples_split: [5, 10, 15]
          min_samples_leaf: [2, 4, 6]
          class_weight: ["balanced", "balanced_subsample", null]

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s — %(name)s — %(levelname)s — %(message)s"
  log_file: "logs/voyage_analytics.log"
