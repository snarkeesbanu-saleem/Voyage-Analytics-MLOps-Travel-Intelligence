apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-api
  labels:
    app: voyage-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-api
  template:
    metadata:
      labels:
        app: voyage-api
    spec:
      containers:
      - name: api
        image: voyage-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "1.0"
            memory: 1Gi
          requests:
            cpu: "0.5"
            memory: 512Mi
        env:
        - name: FLASK_ENV
          value: "production"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5001"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
