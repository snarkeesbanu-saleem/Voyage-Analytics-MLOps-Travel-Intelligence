version: '3.8'

services:
  mlflow:
    image: python:3.10-slim
    container_name: voyage_mlflow
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/app/mlruns
    working_dir: /app
    command: >
      sh -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns"
    networks:
      - voyage_net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: voyage_api
    ports:
      - "5000:5000"
    volumes:
      - ../models:/app/models
      - ../logs:/app/logs
    environment:
      - FLASK_ENV=production
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow
    networks:
      - voyage_net

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: voyage_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    environment:
      - API_URL=http://api:5000
    depends_on:
      - api
    networks:
      - voyage_net

networks:
  voyage_net:
    driver: bridge

volumes:
  mlflow_data:
